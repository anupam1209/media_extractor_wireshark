# Render Blueprint — lets you deploy straight from GitHub with one click.
# Docs: https://render.com/docs/blueprint-spec
#
# In the Render dashboard:  New +  ->  Blueprint  ->  connect this repo.
# Render reads this file, builds the Dockerfile, and hosts the result.
services:
  - type: web
    name: pcap-media-extractor
    runtime: docker          # build/run from ./Dockerfile (not a native buildpack)
    plan: free               # bump to "starter" if large PCAPs exhaust the 512 MB free RAM
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz # unauthenticated health endpoint (GET / needs auth once enabled)
    autoDeploy: true          # redeploy automatically on every push to the branch
    # Render injects $PORT automatically; the container already binds it.
    # Set these in the Render dashboard (Environment tab) to password-protect the
    # site with HTTP Basic Auth. sync:false keeps the secret values OUT of git.
    envVars:
      - key: MEDIAX_USER
        sync: false
      - key: MEDIAX_PASS
        sync: false
